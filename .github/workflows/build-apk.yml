name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload artifacts and create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumiere-player-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Create a GitHub Release with the APK when a version tag is pushed
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Lumière ${{ github.ref_name }}
          body: |
            ## Lumière Android APK — ${{ github.ref_name }}

            ### Install on Android
            1. Download `app-debug.apk` below
            2. On your Android device open **Settings → Security** and enable **Install unknown apps** for your browser / file manager
            3. Open the downloaded APK file and tap **Install**
            4. Launch **Lumière** from your home screen
            5. On first launch tap **Select Videos** to pick your video files

            > This is a sideloadable debug build — no Play Store required.
